<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi API Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📊 Multi API Dashboard</h1>
        <button id="refreshBtn">🔄 Refresh All</button>
        <p id="loadTime"></p>
    </header>

    <main class="dashboard">

        <div class="widget">
            <h2>🌦️ Weather</h2>
            <div id="weather">Loading...</div>
        </div>

        <div class="widget">
            <h2>🌍 Country Info</h2>
            <div id="country">Loading...</div>
        </div>

        <div class="widget">
            <h2>👤 Random Users</h2>
            <div id="users">Loading...</div>
        </div>

        <div class="widget">
            <h2>🐶 Random Dogs</h2>
            <div id="dogs">Loading...</div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
