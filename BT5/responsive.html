<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

<header class="header">
    <div class="logo">ShopTLU</div>

    <button class="hamburger">☰</button>

    <nav class="nav">
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Khuyến mãi</a>
        <a href="#">Liên hệ</a>
    </nav>
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Bộ lọc</h3>

        <label><input type="checkbox"> Apple</label>
        <label><input type="checkbox"> Samsung</label>
        <label><input type="checkbox"> Xiaomi</label>
        <label><input type="checkbox"> Asus</label>
    </aside>

    <main class="products">

        <div class="card">
            <img src="https://picsum.photos/300/200?1" alt="iPhone">
            <h3>iPhone 16</h3>
            <p>25.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?2" alt="">
            <h3>MacBook Pro</h3>
            <p>45.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?3" alt="">
            <h3>iPad Pro</h3>
            <p>28.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?4" alt="">
            <h3>Apple Watch</h3>
            <p>10.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?5" alt="">
            <h3>AirPods Pro</h3>
            <p>6.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?6" alt="">
            <h3>Samsung S25</h3>
            <p>24.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?7" alt="">
            <h3>Dell XPS</h3>
            <p>39.990.000đ</p>
            <button>Mua ngay</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?8" alt="">
            <h3>Asus ROG</h3>
            <p>35.990.000đ</p>
            <button>Mua ngay</button>
        </div>

    </main>

    <aside class="ads">
        <h3>Quảng cáo</h3>
        <img src="https://picsum.photos/250/500" alt="">
    </aside>

</div>

<footer>
    <p>© 2026 ShopTLU. All Rights Reserved.</p>
</footer>

</body>
</html>
