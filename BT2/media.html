<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Giới thiệu sản phẩm</h1>

<figure>
<img
src="https://picsum.photos/600/400?1"
alt="iPhone 16 Pro Max màu Titan"
loading="lazy">
<figcaption>iPhone 16 Pro Max</figcaption>
</figure>

<figure>
<img
src="https://picsum.photos/600/400?2"
alt="MacBook Pro M4"
loading="lazy">
<figcaption>MacBook Pro</figcaption>
</figure>

<figure>
<img
src="https://picsum.photos/600/400?3"
alt="iPad Pro"
loading="lazy">
<figcaption>iPad Pro</figcaption>
</figure>

<iframe
height="500"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

<video controls poster="poster.jpg">

<source src="video.mp4" type="video/mp4">
<source src="video.webm" type="video/webm">

</video>

<audio controls>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<svg width="100" height="100">

<circle
cx="50"
cy="50"
r="40"
fill="blue">
</circle>

</svg>

</div>

</body>
</html>
