<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Đặt hàng</h1>

<table>

<thead>
<tr>
<th>STT</th>
<th>Sản phẩm</th>
<th>Đơn giá</th>
<th>Số lượng</th>
<th>Thành tiền</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>iPhone 16</td>
<td>25.000.000</td>
<td>1</td>
<td>25.000.000</td>
</tr>

<tr>
<td>2</td>
<td>AirPods Pro</td>
<td>5.000.000</td>
<td>1</td>
<td>5.000.000</td>
</tr>

<tr>
<td>3</td>
<td>Apple Watch</td>
<td>8.000.000</td>
<td>1</td>
<td>8.000.000</td>
</tr>

</tbody>

<tfoot>

<tr>
<td colspan="4">
Tổng cộng
</td>

<td>
38.000.000
</td>

</tr>

</tfoot>

</table>

<form>

<label>Phương thức thanh toán</label>

<input type="radio" name="pay"> COD
<input type="radio" name="pay"> Chuyển khoản
<input type="radio" name="pay"> Ví điện tử

<br><br>

<label>Mã giảm giá</label>

<input
type="text"
pattern="SALE[0-9]{4}"
placeholder="SALE2026">

<label>Ngày giao hàng</label>

<input
type="date"
min="2026-06-01">

<label>Khung giờ</label>

<select>

<option>Sáng 8-12h</option>
<option>Chiều 14-18h</option>
<option>Tối 18-21h</option>

</select>

<label>Thời gian giao hàng</label>

<input
type="range"
min="1"
max="7"
step="1">

<label>Điểm tích lũy</label>

<progress
value="70"
max="100">
</progress>

<br><br>

<button
type="submit"
class="submit-btn"
aria-label="Xác nhận đặt hàng">
Đặt hàng
</button>

</form>

</div>

</body>
</html>
